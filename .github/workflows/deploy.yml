name: Build & Deploy IAAS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: gowtham-0903

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./iaas-backend
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/iaas-backend:latest
            ghcr.io/${{ env.ORG }}/iaas-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./iaas-frontend
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/iaas-frontend:latest
            ghcr.io/${{ env.ORG }}/iaas-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_DROPLET_IP }}
          username: iaas-deploy
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/iaas
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            sleep 15
            docker exec iaas-backend flask db upgrade || true
